<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Internship di BRI - The Game</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&display=swap" rel="stylesheet">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            user-select: none;
            /* Menggunakan font retro */
            font-family: 'VT323', monospace; 
        }

        body {
            background-color: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: #fff;
            overflow: hidden;
        }

        #game-container {
            width: 100%;
            max-width: 480px;
            height: 100vh;
            max-height: 850px;
            background-color: #000;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 2px solid #333;
        }

        /* --- Scene Cerita --- */
        #story-scene {
            flex: 1;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            /* Background Pixel Kantor (Bisa diganti dengan file lokal misal: url('bg-kantor.png')) */
            background-image: url('https://images.unsplash.com/photo-1550745165-9bc0b252726f?ixlib=rb-4.0.3&auto=format&fit=crop&w=800&q=80'); 
            background-size: cover;
            background-position: center;
            image-rendering: pixelated; /* Efek pixelated pada background */
        }

        /* Overlay gelap agar karakter dan teks lebih terbaca */
        .bg-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: 1;
        }

        #character-display {
            position: absolute;
            top: 15%;
            width: 100%;
            height: 55%;
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: -10px;
            z-index: 2;
        }

        .char-img {
            height: 100%;
            max-width: 45%;
            object-fit: cover;
            border-radius: 5px;
            filter: drop-shadow(0px 0px 5px #000);
            transition: opacity 0.2s ease, transform 0.2s ease;
            opacity: 0;
            transform: translateY(10px);
            display: none;
        }

        .char-img.active {
            opacity: 1;
            transform: translateY(0);
            display: block;
        }

        /* Desain Kotak Dialog Retro RPG */
        #dialogue-box {
            background-color: #0000aa;
            color: #fff;
            padding: 15px 20px;
            min-height: 180px;
            border: 4px solid #fff;
            border-radius: 8px;
            margin: 10px;
            position: relative;
            z-index: 10;
            cursor: pointer;
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
        }

        #speaker-name {
            font-size: 1.5rem;
            color: #ffff55;
            margin-bottom: 5px;
            text-transform: uppercase;
            text-shadow: 2px 2px #000;
        }

        #dialogue-text {
            font-size: 1.4rem;
            line-height: 1.2;
            text-shadow: 1px 1px #000;
        }

        .tap-indicator {
            position: absolute;
            bottom: 10px;
            right: 15px;
            font-size: 1.2rem;
            color: #fff;
            animation: blink 0.8s infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0; }
        }

        /* --- Scene Input Nama --- */
        #input-scene {
            display: none;
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 170, 0.95);
            z-index: 20;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            border: 4px solid #fff;
            margin: 10px;
            border-radius: 8px;
        }

        #input-scene h2 {
            font-size: 1.8rem;
            margin-bottom: 20px;
            text-align: center;
            text-shadow: 2px 2px #000;
        }

        #input-scene input {
            width: 80%;
            padding: 10px;
            font-size: 1.5rem;
            border: 4px solid #fff;
            background: #000;
            color: #fff;
            margin-bottom: 20px;
            text-align: center;
            outline: none;
        }

        #input-scene button {
            padding: 10px 20px;
            font-size: 1.5rem;
            background-color: #55ff55;
            color: #000;
            border: 4px solid #fff;
            cursor: pointer;
            text-transform: uppercase;
        }

        #input-scene button:active {
            background-color: #00aa00;
        }

        /* --- Scene Minigame --- */
        #minigame-scene {
            display: none;
            flex-direction: column;
            height: 100%;
            background-color: #222;
            padding: 20px;
            text-align: center;
            background-image: linear-gradient(#444 1px, transparent 1px), linear-gradient(90deg, #444 1px, transparent 1px);
            background-size: 20px 20px;
        }

        #minigame-scene h2 {
            margin-bottom: 5px;
            color: #ff5555;
            font-size: 2rem;
            text-shadow: 2px 2px #000;
        }

        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            flex: 1;
            align-items: center;
            margin-top: 10px;
        }

        .target-char {
            width: 100%;
            aspect-ratio: 1/1;
            background-color: #000;
            background-size: cover;
            background-position: center;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            border: 4px solid #fff;
            border-radius: 8px;
            box-shadow: 4px 4px 0px #000;
        }

        .target-char:active {
            transform: translate(2px, 2px);
            box-shadow: 2px 2px 0px #000;
        }

        /* Level Bonyok */
        .bonyok-1 { filter: brightness(0.8) contrast(1.2) sepia(0.3) saturate(1.5); }
        .bonyok-2 { filter: brightness(0.6) contrast(1.4) sepia(0.5) hue-rotate(-30deg) saturate(2); }
        .bonyok-3 { filter: brightness(0.4) contrast(1.5) sepia(0.8) hue-rotate(-50deg) saturate(2.5); border-color: #ff5555; }

        .shake { animation: shake 0.2s; }

        @keyframes shake {
            0% { transform: translate(2px, 2px); }
            20% { transform: translate(-4px, 0px); }
            40% { transform: translate(2px, -2px); }
            60% { transform: translate(-4px, 2px); }
            80% { transform: translate(-2px, -2px); }
            100% { transform: translate(2px, -4px); }
        }

        .hit-effect {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ff0000;
            opacity: 0;
            pointer-events: none;
        }

        .hit-anim { animation: hitFlash 0.2s ease-out; }

        @keyframes hitFlash {
            0% { opacity: 0.8; }
            100% { opacity: 0; }
        }
    </style>
</head>
<body>

<div id="game-container">
    
    <div id="story-scene">
        <div class="bg-overlay"></div>
        <div id="character-display">
            <img src="foto1.png" id="c1" class="char-img" alt="Foto 1">
            <img src="foto2.png" id="c2" class="char-img" alt="Foto 2">
            <img src="foto3.png" id="c3" class="char-img" alt="Foto 3">
            <img src="foto4.png" id="c4" class="char-img" alt="Foto 4">
        </div>
        
        <div id="dialogue-box" onclick="nextLine()">
            <div id="speaker-name">Mbak Bos</div>
            <div id="dialogue-text">Loading...</div>
            <div class="tap-indicator">▼</div>
        </div>
    </div>

    <div id="input-scene">
        <h2>ID CARD MAGANG</h2>
        <input type="text" id="player-name" placeholder="NAMA KAMU..." autocomplete="off">
        <button onclick="submitName()">ENTER</button>
    </div>

    <div id="minigame-scene">
        <h2>FIGHT!</h2>
        <p style="font-size: 1.2rem; margin-bottom: 10px;">(TAP WAJAH MEREKA SAMPAI BONYOK)</p>
        
        <div class="grid-container">
            <div class="target-char" style="background-image: url('foto1.png')" onclick="punch(this, 0)">
                <div class="hit-effect"></div>
            </div>
            <div class="target-char" style="background-image: url('foto2.png')" onclick="punch(this, 1)">
                <div class="hit-effect"></div>
            </div>
            <div class="target-char" style="background-image: url('foto3.png')" onclick="punch(this, 2)">
                <div class="hit-effect"></div>
            </div>
            <div class="target-char" style="background-image: url('foto4.png')" onclick="punch(this, 3)">
                <div class="hit-effect"></div>
            </div>
        </div>
    </div>

</div>

<script>
    let userName = "";
    let currentLine = 0;
    
    let charDamage = [0, 0, 0, 0];

    // Alur Cerita Detail sesuai request
    const story = [
        // Foto 2 ngomel ke Foto 1 dan Foto 3
        { 
            speaker: "Mbak Bos (Foto 2)", 
            text: "Kalian ini gimana sih?! Tim Activation BRImo mandek semua! Kerjaan belum pada beres, malah pada santai-santai bercanda!", 
            chars: ["c2"] 
        },
        // Foto 1 dan 3 bercanda satir dan saling menyalahkan (berantem)
        { 
            speaker: "Si Kacamata (Foto 1)", 
            text: "Tuh dengerin kata Mbak Bos! Elu sih ngurusin data vendor aja lelet banget kerjanya.", 
            chars: ["c1", "c3"] 
        },
        { 
            speaker: "Si Senyum (Foto 3)", 
            text: "Lah kok nyalahin gue?! Situ yang kemaren janji bikin deck presentasi malah ngilang duluan! Gaya elit kerja sulit lu.", 
            chars: ["c1", "c3"] 
        },
        { 
            speaker: "Si Kacamata (Foto 1)", 
            text: "Enak aja! Gue kan lagi sibuk lobi klien. Udah lah buruan kerjain tuh, gue mau ke pantry dulu.", 
            chars: ["c1", "c3"] 
        },
        // Foto 4 bete karena ketumpahan kerjaan dari Foto 1 & 3
        { 
            speaker: "Si Belah Samping (Foto 4)", 
            text: "WOI! Bisa diem nggak kalian berdua?! Gue lagi bete banget nih ngerjain tumpukan revisi dari kelakuan kalian! Nambah-nambahin kerjaan gue aja!", 
            chars: ["c4"] 
        },
        // Transisi minta nama
        { 
            speaker: "Sistem", 
            text: "Tiba-tiba kamu (anak magang) masuk ke ruangan membawa setumpuk dokumen...", 
            chars: [],
            action: "askName" 
        },
        // Foto 1, 2, 3 menyuruh-nyuruh user
        { 
            speaker: "Trio Mandor (Foto 1,2,3)", 
            text: "Nah ini dia! Oh kamu {name} anak intern baru kan? Tolong dong kerjain rekap logistik buat Solo Run Fest sama urusin timeline booth USS Jakarta 2025 ya! A, B, C beresin semua hari ini!", 
            chars: ["c1", "c2", "c3"] 
        },
        // Foto 4 satir ke user
        { 
            speaker: "Si Belah Samping (Foto 4)", 
            text: "Heh {name}, dengerin tuh! Yang bener kerjanya lu! Awas aja lu numpukin kerjaan revisi di meja gue lagi. Kerja tuh pake otak!", 
            chars: ["c4"] 
        },
        // Selesai story, masuk minigame
        { 
            speaker: "Sistem", 
            text: "Kesabaranmu habis. Kamu mengepalkan tangan dan imajinasi balas dendam pun dimulai...", 
            chars: [],
            action: "startMinigame" 
        }
    ];

    function updateDialogue() {
        if (currentLine >= story.length) return;

        const line = story[currentLine];

        if (line.action === "askName") {
            document.getElementById('story-scene').style.display = 'none';
            document.getElementById('input-scene').style.display = 'flex';
            return;
        }

        if (line.action === "startMinigame") {
            document.getElementById('story-scene').style.display = 'none';
            document.getElementById('minigame-scene').style.display = 'flex';
            return;
        }

        // Ketik teks (replace nama)
        let textToShow = line.text.replace(/{name}/g, userName);
        document.getElementById('speaker-name').innerText = line.speaker;
        document.getElementById('dialogue-text').innerText = textToShow;

        // Tampilkan foto yang sedang bicara
        document.querySelectorAll('.char-img').forEach(img => {
            img.classList.remove('active');
        });

        line.chars.forEach(charId => {
            const imgEl = document.getElementById(charId);
            if(imgEl) imgEl.classList.add('active');
        });
    }

    function nextLine() {
        currentLine++;
        updateDialogue();
    }

    function submitName() {
        const inputVal = document.getElementById('player-name').value.trim();
        if (inputVal === "") {
            alert("ISI NAMA DULU!");
            return;
        }
        userName = inputVal.toUpperCase(); // Biar cocok dengan tema retro
        document.getElementById('input-scene').style.display = 'none';
        document.getElementById('story-scene').style.display = 'flex';
        nextLine(); 
    }

    function punch(element, charIndex) {
        charDamage[charIndex]++;
        let damage = charDamage[charIndex];

        // Restart class shake supaya animasi berulang setiap di-tap
        element.classList.remove('shake');
        void element.offsetWidth;
        element.classList.add('shake');

        // Restart animasi flash merah
        const hitEffect = element.querySelector('.hit-effect');
        hitEffect.classList.remove('hit-anim');
        void hitEffect.offsetWidth;
        hitEffect.classList.add('hit-anim');

        // Update tingkat kebonyokan
        if (damage > 12) {
            element.className = "target-char bonyok-3 shake";
        } else if (damage > 6) {
            element.className = "target-char bonyok-2 shake";
        } else if (damage > 2) {
            element.className = "target-char bonyok-1 shake";
        }
    }

    window.onload = () => {
        updateDialogue();
    };
</script>

</body>
</html>
